apiVersion: perses.dev/v1alpha2
kind: PersesDashboard
metadata:
  name: kubevirt-metrics-exporter
  namespace: kubevirt-metrics-exporter
  labels:
    app: kubevirt-metrics-exporter
spec:
  config:
    display:
      name: KubeVirt Storage Latency
      description: Storage I/O latency from QMP and eBPF subsystems
    duration: 1h
    refreshInterval: 30s

    variables:
      - kind: ListVariable
        spec:
          name: node
          display:
            name: Node
          allowAllValue: true
          allowMultiple: true
          customAllValue: ".*"
          plugin:
            kind: PrometheusLabelValuesVariable
            spec:
              datasource:
                kind: PrometheusDatasource
                name: thanos-querier
              labelName: node
              matchers:
                - "kube_node_info{}"

      - kind: ListVariable
        spec:
          name: namespace
          display:
            name: Namespace
          allowAllValue: true
          allowMultiple: true
          customAllValue: ".*"
          plugin:
            kind: PrometheusLabelValuesVariable
            spec:
              datasource:
                kind: PrometheusDatasource
                name: thanos-querier
              labelName: namespace
              matchers:
                - "kube_namespace_labels{}"

      - kind: ListVariable
        spec:
          name: vmi
          display:
            name: VMI
          allowAllValue: true
          allowMultiple: true
          customAllValue: ".*"
          plugin:
            kind: PrometheusLabelValuesVariable
            spec:
              datasource:
                kind: PrometheusDatasource
                name: thanos-querier
              labelName: name
              matchers:
                - 'kubevirt_vmi_info{node=~"$node", namespace=~"$namespace"}'

      - kind: ListVariable
        spec:
          name: persistentvolumeclaim
          display:
            name: Volume
          allowAllValue: true
          allowMultiple: true
          customAllValue: ".*"
          plugin:
            kind: PrometheusLabelValuesVariable
            spec:
              datasource:
                kind: PrometheusDatasource
                name: thanos-querier
              labelName: persistentvolumeclaim
              matchers:
                - 'kube_persistentvolumeclaim_info{namespace=~"$namespace"}'

      - kind: ListVariable
        spec:
          name: operation
          display:
            name: Operation
          allowAllValue: true
          allowMultiple: true
          customAllValue: ".*"
          plugin:
            kind: StaticListVariable
            spec:
              values:
                - read
                - write
                - flush
                - discard
                - open
                - getattr

      - kind: ListVariable
        spec:
          name: interval
          display:
            name: Rate Interval
          allowAllValue: false
          allowMultiple: false
          defaultValue: "5m"
          plugin:
            kind: StaticListVariable
            spec:
              values:
                - "1m"
                - "2m"
                - "5m"
                - "10m"

    panels:
      status_block:
        kind: Panel
        spec:
          display:
            name: Block Subsystem
          plugin:
            kind: StatChart
            spec:
              calculation: last
          queries:
            - kind: TimeSeriesQuery
              spec:
                plugin:
                  kind: PrometheusTimeSeriesQuery
                  spec:
                    datasource:
                      kind: PrometheusDatasource
                      name: thanos-querier
                    query: 'max(kubevirt_storage_subsystem_active{subsystem="block"})'

      status_nfs:
        kind: Panel
        spec:
          display:
            name: NFS Subsystem
          plugin:
            kind: StatChart
            spec:
              calculation: last
          queries:
            - kind: TimeSeriesQuery
              spec:
                plugin:
                  kind: PrometheusTimeSeriesQuery
                  spec:
                    datasource:
                      kind: PrometheusDatasource
                      name: thanos-querier
                    query: 'max(kubevirt_storage_subsystem_active{subsystem="nfs"})'

      status_nfs_kprobe:
        kind: Panel
        spec:
          display:
            name: NFS Kprobe Subsystem
          plugin:
            kind: StatChart
            spec:
              calculation: last
          queries:
            - kind: TimeSeriesQuery
              spec:
                plugin:
                  kind: PrometheusTimeSeriesQuery
                  spec:
                    datasource:
                      kind: PrometheusDatasource
                      name: thanos-querier
                    query: 'max(kubevirt_storage_subsystem_active{subsystem="nfs_kprobe"})'

      qmp_quantiles:
        kind: Panel
        spec:
          display:
            name: QMP VM Disk Latency
          plugin:
            kind: TimeSeriesChart
            spec:
              yAxis:
                format:
                  unit: seconds
              legend:
                position: bottom
                mode: table
          queries:
            - kind: TimeSeriesQuery
              spec:
                plugin:
                  kind: PrometheusTimeSeriesQuery
                  spec:
                    datasource:
                      kind: PrometheusDatasource
                      name: thanos-querier
                    query: 'histogram_quantile(0.5, sum by (le) (rate(kubevirt_storage_qmp_io_latency_seconds_bucket{node=~"$node", namespace=~"$namespace", vmi=~"$vmi", operation=~"$operation", persistentvolumeclaim=~"$persistentvolumeclaim"}[$interval])))'
                    minStep: "30s"
                    seriesNameFormat: p50
            - kind: TimeSeriesQuery
              spec:
                plugin:
                  kind: PrometheusTimeSeriesQuery
                  spec:
                    datasource:
                      kind: PrometheusDatasource
                      name: thanos-querier
                    query: 'histogram_quantile(0.9, sum by (le) (rate(kubevirt_storage_qmp_io_latency_seconds_bucket{node=~"$node", namespace=~"$namespace", vmi=~"$vmi", operation=~"$operation", persistentvolumeclaim=~"$persistentvolumeclaim"}[$interval])))'
                    minStep: "30s"
                    seriesNameFormat: p90
            - kind: TimeSeriesQuery
              spec:
                plugin:
                  kind: PrometheusTimeSeriesQuery
                  spec:
                    datasource:
                      kind: PrometheusDatasource
                      name: thanos-querier
                    query: 'histogram_quantile(0.99, sum by (le) (rate(kubevirt_storage_qmp_io_latency_seconds_bucket{node=~"$node", namespace=~"$namespace", vmi=~"$vmi", operation=~"$operation", persistentvolumeclaim=~"$persistentvolumeclaim"}[$interval])))'
                    minStep: "30s"
                    seriesNameFormat: p99
            - kind: TimeSeriesQuery
              spec:
                plugin:
                  kind: PrometheusTimeSeriesQuery
                  spec:
                    datasource:
                      kind: PrometheusDatasource
                      name: thanos-querier
                    query: 'histogram_quantile(0.999, sum by (le) (rate(kubevirt_storage_qmp_io_latency_seconds_bucket{node=~"$node", namespace=~"$namespace", vmi=~"$vmi", operation=~"$operation", persistentvolumeclaim=~"$persistentvolumeclaim"}[$interval])))'
                    minStep: "30s"
                    seriesNameFormat: p99.9

      block_quantiles:
        kind: Panel
        spec:
          display:
            name: Block I/O Latency (Pod Volumes)
          plugin:
            kind: TimeSeriesChart
            spec:
              yAxis:
                format:
                  unit: seconds
              legend:
                position: bottom
                mode: table
          queries:
            - kind: TimeSeriesQuery
              spec:
                plugin:
                  kind: PrometheusTimeSeriesQuery
                  spec:
                    datasource:
                      kind: PrometheusDatasource
                      name: thanos-querier
                    query: 'histogram_quantile(0.5, sum by (le) (rate(kubevirt_storage_block_io_latency_seconds_bucket{node=~"$node", namespace=~"$namespace", operation=~"$operation", persistentvolumeclaim=~"$persistentvolumeclaim"}[$interval]) * on(namespace, pod) group_left() label_replace(kubevirt_vmi_info{name=~"$vmi", node=~"$node"}, "pod", "$1", "vmi_pod", "(.*)")))'
                    minStep: "30s"
                    seriesNameFormat: p50
            - kind: TimeSeriesQuery
              spec:
                plugin:
                  kind: PrometheusTimeSeriesQuery
                  spec:
                    datasource:
                      kind: PrometheusDatasource
                      name: thanos-querier
                    query: 'histogram_quantile(0.9, sum by (le) (rate(kubevirt_storage_block_io_latency_seconds_bucket{node=~"$node", namespace=~"$namespace", operation=~"$operation", persistentvolumeclaim=~"$persistentvolumeclaim"}[$interval]) * on(namespace, pod) group_left() label_replace(kubevirt_vmi_info{name=~"$vmi", node=~"$node"}, "pod", "$1", "vmi_pod", "(.*)")))'
                    minStep: "30s"
                    seriesNameFormat: p90
            - kind: TimeSeriesQuery
              spec:
                plugin:
                  kind: PrometheusTimeSeriesQuery
                  spec:
                    datasource:
                      kind: PrometheusDatasource
                      name: thanos-querier
                    query: 'histogram_quantile(0.99, sum by (le) (rate(kubevirt_storage_block_io_latency_seconds_bucket{node=~"$node", namespace=~"$namespace", operation=~"$operation", persistentvolumeclaim=~"$persistentvolumeclaim"}[$interval]) * on(namespace, pod) group_left() label_replace(kubevirt_vmi_info{name=~"$vmi", node=~"$node"}, "pod", "$1", "vmi_pod", "(.*)")))'
                    minStep: "30s"
                    seriesNameFormat: p99
            - kind: TimeSeriesQuery
              spec:
                plugin:
                  kind: PrometheusTimeSeriesQuery
                  spec:
                    datasource:
                      kind: PrometheusDatasource
                      name: thanos-querier
                    query: 'histogram_quantile(0.999, sum by (le) (rate(kubevirt_storage_block_io_latency_seconds_bucket{node=~"$node", namespace=~"$namespace", operation=~"$operation", persistentvolumeclaim=~"$persistentvolumeclaim"}[$interval]) * on(namespace, pod) group_left() label_replace(kubevirt_vmi_info{name=~"$vmi", node=~"$node"}, "pod", "$1", "vmi_pod", "(.*)")))'
                    minStep: "30s"
                    seriesNameFormat: p99.9

      nfs_quantiles:
        kind: Panel
        spec:
          display:
            name: NFS I/O Latency (Tracepoint)
          plugin:
            kind: TimeSeriesChart
            spec:
              yAxis:
                format:
                  unit: seconds
              legend:
                position: bottom
                mode: table
          queries:
            - kind: TimeSeriesQuery
              spec:
                plugin:
                  kind: PrometheusTimeSeriesQuery
                  spec:
                    datasource:
                      kind: PrometheusDatasource
                      name: thanos-querier
                    query: 'histogram_quantile(0.5, sum by (le) (rate(kubevirt_storage_nfs_io_latency_seconds_bucket{node=~"$node", namespace=~"$namespace", operation=~"$operation", persistentvolumeclaim=~"$persistentvolumeclaim"}[$interval]) * on(namespace, pod) group_left() label_replace(kubevirt_vmi_info{name=~"$vmi", node=~"$node"}, "pod", "$1", "vmi_pod", "(.*)")))'
                    minStep: "30s"
                    seriesNameFormat: p50
            - kind: TimeSeriesQuery
              spec:
                plugin:
                  kind: PrometheusTimeSeriesQuery
                  spec:
                    datasource:
                      kind: PrometheusDatasource
                      name: thanos-querier
                    query: 'histogram_quantile(0.9, sum by (le) (rate(kubevirt_storage_nfs_io_latency_seconds_bucket{node=~"$node", namespace=~"$namespace", operation=~"$operation", persistentvolumeclaim=~"$persistentvolumeclaim"}[$interval]) * on(namespace, pod) group_left() label_replace(kubevirt_vmi_info{name=~"$vmi", node=~"$node"}, "pod", "$1", "vmi_pod", "(.*)")))'
                    minStep: "30s"
                    seriesNameFormat: p90
            - kind: TimeSeriesQuery
              spec:
                plugin:
                  kind: PrometheusTimeSeriesQuery
                  spec:
                    datasource:
                      kind: PrometheusDatasource
                      name: thanos-querier
                    query: 'histogram_quantile(0.99, sum by (le) (rate(kubevirt_storage_nfs_io_latency_seconds_bucket{node=~"$node", namespace=~"$namespace", operation=~"$operation", persistentvolumeclaim=~"$persistentvolumeclaim"}[$interval]) * on(namespace, pod) group_left() label_replace(kubevirt_vmi_info{name=~"$vmi", node=~"$node"}, "pod", "$1", "vmi_pod", "(.*)")))'
                    minStep: "30s"
                    seriesNameFormat: p99
            - kind: TimeSeriesQuery
              spec:
                plugin:
                  kind: PrometheusTimeSeriesQuery
                  spec:
                    datasource:
                      kind: PrometheusDatasource
                      name: thanos-querier
                    query: 'histogram_quantile(0.999, sum by (le) (rate(kubevirt_storage_nfs_io_latency_seconds_bucket{node=~"$node", namespace=~"$namespace", operation=~"$operation", persistentvolumeclaim=~"$persistentvolumeclaim"}[$interval]) * on(namespace, pod) group_left() label_replace(kubevirt_vmi_info{name=~"$vmi", node=~"$node"}, "pod", "$1", "vmi_pod", "(.*)")))'
                    minStep: "30s"
                    seriesNameFormat: p99.9

      nfs_vfs_quantiles:
        kind: Panel
        spec:
          display:
            name: NFS VFS Latency (Kprobe)
          plugin:
            kind: TimeSeriesChart
            spec:
              yAxis:
                format:
                  unit: seconds
              legend:
                position: bottom
                mode: table
          queries:
            - kind: TimeSeriesQuery
              spec:
                plugin:
                  kind: PrometheusTimeSeriesQuery
                  spec:
                    datasource:
                      kind: PrometheusDatasource
                      name: thanos-querier
                    query: 'histogram_quantile(0.5, sum by (le) (rate(kubevirt_storage_nfs_vfs_latency_seconds_bucket{node=~"$node", namespace=~"$namespace", operation=~"$operation", persistentvolumeclaim=~"$persistentvolumeclaim"}[$interval]) * on(namespace, pod) group_left() label_replace(kubevirt_vmi_info{name=~"$vmi", node=~"$node"}, "pod", "$1", "vmi_pod", "(.*)")))'
                    minStep: "30s"
                    seriesNameFormat: p50
            - kind: TimeSeriesQuery
              spec:
                plugin:
                  kind: PrometheusTimeSeriesQuery
                  spec:
                    datasource:
                      kind: PrometheusDatasource
                      name: thanos-querier
                    query: 'histogram_quantile(0.9, sum by (le) (rate(kubevirt_storage_nfs_vfs_latency_seconds_bucket{node=~"$node", namespace=~"$namespace", operation=~"$operation", persistentvolumeclaim=~"$persistentvolumeclaim"}[$interval]) * on(namespace, pod) group_left() label_replace(kubevirt_vmi_info{name=~"$vmi", node=~"$node"}, "pod", "$1", "vmi_pod", "(.*)")))'
                    minStep: "30s"
                    seriesNameFormat: p90
            - kind: TimeSeriesQuery
              spec:
                plugin:
                  kind: PrometheusTimeSeriesQuery
                  spec:
                    datasource:
                      kind: PrometheusDatasource
                      name: thanos-querier
                    query: 'histogram_quantile(0.99, sum by (le) (rate(kubevirt_storage_nfs_vfs_latency_seconds_bucket{node=~"$node", namespace=~"$namespace", operation=~"$operation", persistentvolumeclaim=~"$persistentvolumeclaim"}[$interval]) * on(namespace, pod) group_left() label_replace(kubevirt_vmi_info{name=~"$vmi", node=~"$node"}, "pod", "$1", "vmi_pod", "(.*)")))'
                    minStep: "30s"
                    seriesNameFormat: p99
            - kind: TimeSeriesQuery
              spec:
                plugin:
                  kind: PrometheusTimeSeriesQuery
                  spec:
                    datasource:
                      kind: PrometheusDatasource
                      name: thanos-querier
                    query: 'histogram_quantile(0.999, sum by (le) (rate(kubevirt_storage_nfs_vfs_latency_seconds_bucket{node=~"$node", namespace=~"$namespace", operation=~"$operation", persistentvolumeclaim=~"$persistentvolumeclaim"}[$interval]) * on(namespace, pod) group_left() label_replace(kubevirt_vmi_info{name=~"$vmi", node=~"$node"}, "pod", "$1", "vmi_pod", "(.*)")))'
                    minStep: "30s"
                    seriesNameFormat: p99.9

    layouts:
      - kind: Grid
        spec:
          display:
            title: eBPF Subsystem Status
            collapse:
              open: true
          items:
            - x: 0
              "y": 0
              width: 8
              height: 4
              content:
                $ref: '#/spec/panels/status_block'
            - x: 8
              "y": 0
              width: 8
              height: 4
              content:
                $ref: '#/spec/panels/status_nfs'
            - x: 16
              "y": 0
              width: 8
              height: 4
              content:
                $ref: '#/spec/panels/status_nfs_kprobe'

      - kind: Grid
        spec:
          display:
            title: QMP VM Disk Latency
            collapse:
              open: true
          items:
            - x: 0
              "y": 0
              width: 24
              height: 8
              content:
                $ref: '#/spec/panels/qmp_quantiles'

      - kind: Grid
        spec:
          display:
            title: Block I/O (Pod Volumes)
            collapse:
              open: true
          items:
            - x: 0
              "y": 0
              width: 24
              height: 8
              content:
                $ref: '#/spec/panels/block_quantiles'

      - kind: Grid
        spec:
          display:
            title: NFS I/O (Tracepoint)
            collapse:
              open: true
          items:
            - x: 0
              "y": 0
              width: 24
              height: 8
              content:
                $ref: '#/spec/panels/nfs_quantiles'

      - kind: Grid
        spec:
          display:
            title: NFS VFS Latency (Kprobe)
            collapse:
              open: true
          items:
            - x: 0
              "y": 0
              width: 24
              height: 8
              content:
                $ref: '#/spec/panels/nfs_vfs_quantiles'
