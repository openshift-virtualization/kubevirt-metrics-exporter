name: Build and Push Image
on:
  push:
    branches: ["main", "release-*"]
    tags: ["v*"]

env:
  IMAGE: quay.io/openshift-virtualization/kubevirt-storage-latency-exporter

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: tag
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$(date +'%Y%m%d-%H%M%S')" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Containerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.tag.outputs.tag }}
            ${{ env.IMAGE }}:latest

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-push
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate install manifests
        env:
          TAG: ${{ github.ref_name }}
        run: |
          make deploy-manifest IMAGE=${{ env.IMAGE }} TAG=${TAG} > install-openshift.yaml
          make deploy-manifest-kubernetes IMAGE=${{ env.IMAGE }} TAG=${TAG} > install-kubernetes.yaml

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            install-openshift.yaml
            install-kubernetes.yaml
